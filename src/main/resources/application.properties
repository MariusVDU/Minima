# MySQL lokalus prisijungimas
# Nustatykite aplinkos kintamuosius arba naudokite numatytas reikšmes
spring.datasource.url=jdbc:mysql://localhost:3306/minima?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# Jei naudojate kitą MySQL portą, pakeiskite 3306 į savo
# Jei slaptažodis kitas, pakeiskite spring.datasource.password

# Hibernate konfigūracija - automatinis lentelių kūrimas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Serverio nustatymai
server.port=8080
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example=DEBUG