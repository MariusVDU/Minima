services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Jungiamasi prie lokalaus MySQL (ne Docker konteinerio)
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/minima?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-root}
    network_mode: "bridge"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure